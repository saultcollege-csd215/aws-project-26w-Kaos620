name: Flask App Test Workflow

on:
  push:
    branches:
      - main  # Make sure this matches your lab branch name!

jobs:
  pytest-testing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f app/requirements_flask.txt ]; then pip install -r app/requirements_flask.txt; fi

      - name: Run tests with pytest
        run: |
          pytest