name: Flask App Test Workflow

on:
  push:
    branches:
      - main
jobs:
  pytest-testing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f app/requirements_flask.txt ]; then pip install -r app/requirements_flask.txt; fi

      - name: Run tests with pytest
        run: |
          pytest

      - name: Trigger EC2 Deployment
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: Deploy to EC2
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger Lambda Deployment
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: Deploy Lambda Function
          token: ${{ secrets.GITHUB_TOKEN }}